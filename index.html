<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Hey Doc! — Espace Médecin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0A0F1E;--card:#111827;--card2:#161D2F;--border:#1E2D45;
  --accent:#00C896;--accent2:#0EA5E9;--warn:#F59E0B;--danger:#EF4444;
  --text:#F0F4FF;--text2:#8B9EC7;--text3:#4A5A7A;--white:#FFFFFF;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
#app{height:100%;display:flex;flex-direction:column;position:relative;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.on{display:flex;}

/* LOGIN */
#loginScreen{background:var(--bg);justify-content:center;align-items:center;padding:30px;}
#loginScreen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,200,150,0.12),transparent 70%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(14,165,233,0.08),transparent 60%);pointer-events:none;}
.login-logo{text-align:center;margin-bottom:40px;}
.login-ico{width:80px;height:80px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px;box-shadow:0 0 40px rgba(0,200,150,0.3);}
.login-logo h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--white);}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:28px;width:100%;max-width:380px;}
.login-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;text-align:center;}
.lfield{margin-bottom:14px;}
.lfield label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}
.lfield input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
.lfield input:focus{border-color:var(--accent);}
.lfield input::placeholder{color:var(--text3);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;padding:14px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--bg);cursor:pointer;margin-top:6px;transition:opacity .2s;}
.btn-login:active{opacity:.85;}
.login-err{font-size:12px;color:var(--danger);text-align:center;margin-top:10px;display:none;}
.login-err.on{display:block;}

/* HEADER */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;padding-top:calc(12px + var(--st));display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10;}
.hdr-back{width:36px;height:36px;background:var(--card2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;}
.hdr-ico{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.hdr-info{flex:1;}
.hdr-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--white);}
.hdr-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.hdr-btn{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;}

/* DASHBOARD */
#dashScreen{background:var(--bg);}
.dash-body{flex:1;overflow-y:auto;padding:16px;}
.dash-body::-webkit-scrollbar{display:none;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 12px;text-align:center;}
.stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
.stat-num.g{color:var(--accent);}
.stat-num.b{color:var(--accent2);}
.stat-num.w{color:var(--warn);}
.stat-label{font-size:10px;color:var(--text2);margin-top:3px;}
.filter-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;}
.filter-row::-webkit-scrollbar{display:none;}
.ftag{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.ftag.on{background:var(--accent);border-color:var(--accent);color:var(--bg);}
.sec-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.dcard{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .1s;}
.dcard:active{transform:scale(.98);}
.dcard.urg{border-left:3px solid var(--danger);}
.dcard-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.dcard-av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--bg);flex-shrink:0;}
.dcard-nom{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--white);}
.dcard-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:8px;padding:3px 9px;font-size:10px;font-weight:700;}
.badge.a{background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.3);}
.badge.t{background:rgba(0,200,150,.15);color:var(--accent);border:1px solid rgba(0,200,150,.3);}
.badge.r{background:rgba(14,165,233,.15);color:var(--accent2);border:1px solid rgba(14,165,233,.3);}
.dcard-symp{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.dcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.dcard-id{font-size:10px;color:var(--text3);}
.empty{text-align:center;padding:60px 20px;}
.empty-ico{font-size:48px;margin-bottom:12px;}
.empty-txt{font-size:14px;color:var(--text2);}

/* CONSULTATION */
#consultScreen{background:var(--bg);}
.cbody{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(16px + var(--sb));}
.cbody::-webkit-scrollbar{display:none;}
.fsec{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px;}
.fsec-title{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.fsec-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.fsec-ico.bl{background:rgba(14,165,233,.2);}
.fsec-ico.gr{background:rgba(0,200,150,.2);}
.fsec-ico.wa{background:rgba(245,158,11,.2);}
.fsec-ico.pu{background:rgba(167,139,250,.2);}
.fsec-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);}

/* Chips patient */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;}
.chip-k{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.chip-v{font-size:12px;color:var(--text);font-weight:600;}

/* Grille symptômes */
.symp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.symp-item{background:var(--bg);border-radius:8px;padding:7px 10px;display:flex;align-items:flex-start;gap:6px;}
.symp-dot{color:var(--accent);font-size:10px;margin-top:2px;flex-shrink:0;}
.symp-txt{font-size:12px;color:var(--text2);line-height:1.4;}

/* Diagnostic IA */
.ia-box{background:linear-gradient(135deg,rgba(14,165,233,.08),rgba(0,200,150,.05));border:1px solid rgba(14,165,233,.2);border-radius:12px;padding:14px;}
.ia-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(14,165,233,.15);border:1px solid rgba(14,165,233,.3);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--accent2);letter-spacing:.5px;margin-bottom:8px;}
.ia-txt{font-size:12px;color:var(--text2);line-height:1.6;}

/* Champs */
.flabel{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
.finput{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;resize:none;}
.finput:focus{border-color:var(--accent2);}
.finput::placeholder{color:var(--text3);}
.frow{margin-bottom:12px;}

/* Tags maladies */
.dtags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.dtag{background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:5px 11px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;}
.dtag.on{background:rgba(0,200,150,.15);border-color:var(--accent);color:var(--accent);}

/* Médicaments */
.med-item{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.med-info{flex:1;}
.med-name{font-size:13px;font-weight:600;color:var(--text);}
.med-detail{font-size:11px;color:var(--text2);margin-top:2px;}
.med-del{width:26px;height:26px;background:rgba(239,68,68,.1);border:none;border-radius:8px;color:var(--danger);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.add-med{background:var(--card2);border:1.5px dashed var(--border);border-radius:12px;padding:10px;font-size:12px;color:var(--text2);cursor:pointer;text-align:center;width:100%;font-family:'DM Sans',sans-serif;transition:border-color .2s;}
.add-med:hover{border-color:var(--accent2);}

/* Bouton envoyer */
.btn-send{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;padding:15px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s;box-shadow:0 4px 20px rgba(0,200,150,.25);margin-bottom:14px;}
.btn-send:active{opacity:.85;}
.btn-send:disabled{opacity:.4;cursor:not-allowed;}

/* Validation */
.val-box{border-radius:14px;padding:16px;}
.val-box.conf{background:rgba(0,200,150,.08);border:1px solid rgba(0,200,150,.3);}
.val-box.nconf{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);}
.val-box.load{background:var(--bg);border:1px solid var(--border);text-align:center;padding:24px;}
.val-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:8px;}
.val-txt{font-size:12px;line-height:1.6;color:var(--text2);}
.val-actions{display:flex;gap:8px;margin-top:12px;}
.vbtn{flex:1;border:none;border-radius:11px;padding:11px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.vbtn:active{opacity:.8;}
.vbtn.ok{background:linear-gradient(135deg,var(--accent),#00A878);color:var(--bg);}
.vbtn.ref{background:var(--card2);border:1.5px solid var(--border);color:var(--text2);}

/* Dots */
.dots{display:inline-flex;gap:4px;align-items:center;}
.dot{width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:db 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes db{0%,100%{transform:translateY(0);opacity:.4;}50%{transform:translateY(-5px);opacity:1;}}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;color:var(--text);z-index:1000;box-shadow:0 8px 30px rgba(0,0,0,.4);white-space:nowrap;animation:tIn .3s ease;}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;}
.modal.on{display:flex;}
.modal-box{background:var(--card);border-radius:24px 24px 0 0;padding:24px;padding-bottom:calc(24px + var(--sb));width:100%;}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--white);margin-bottom:18px;}
.modal-acts{display:flex;gap:10px;margin-top:16px;}
.mbtn{flex:1;border:none;border-radius:12px;padding:13px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.mbtn.cancel{background:var(--card2);border:1px solid var(--border);color:var(--text2);}
.mbtn.ok{background:linear-gradient(135deg,var(--accent2),#0284C7);color:var(--white);}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div class="screen on" id="loginScreen">
  <div class="login-logo">
    <div class="login-ico">🩺</div>
    <h1>Hey Doc!</h1>
    <p>Espace Médecin — Accès sécurisé</p>
  </div>
  <div class="login-box">
    <div class="login-title">Connexion</div>
    <div class="lfield"><label>Email</label><input type="email" id="liEmail" placeholder="medecin@hopital.ci" autocomplete="off"/></div>
    <div class="lfield"><label>Code d'accès</label><input type="password" id="liCode" placeholder="••••••"/></div>
    <button class="btn-login" onclick="doLogin()">Accéder aux dossiers →</button>
    <div class="login-err" id="liErr">Email ou code incorrect</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="screen" id="dashScreen">
  <div class="hdr">
    <div class="hdr-ico">🏥</div>
    <div class="hdr-info"><div class="hdr-title" id="dashNom">Dr. —</div><div class="hdr-sub" id="dashSpec">Médecin</div></div>
    <button class="hdr-btn" onclick="doLogout()">Déconnexion</button>
  </div>
  <div class="dash-body">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num w" id="stA">0</div><div class="stat-label">En attente</div></div>
      <div class="stat-card"><div class="stat-num g" id="stT">0</div><div class="stat-label">Traités</div></div>
      <div class="stat-card"><div class="stat-num b" id="stR">0</div><div class="stat-label">Référés</div></div>
    </div>
    <div class="filter-row">
      <div class="ftag on" onclick="setFilter('tous',this)">Tous</div>
      <div class="ftag" onclick="setFilter('attente',this)">⏳ En attente</div>
      <div class="ftag" onclick="setFilter('traite',this)">✅ Traités</div>
      <div class="ftag" onclick="setFilter('refere',this)">🔄 Référés</div>
    </div>
    <div class="sec-title">Dossiers de consultation</div>
    <div id="dList"></div>
  </div>
</div>

<!-- CONSULTATION -->
<div class="screen" id="consultScreen">
  <div class="hdr">
    <div class="hdr-back" onclick="goBack()">←</div>
    <div class="hdr-info"><div class="hdr-title" id="cTitre">Dossier</div><div class="hdr-sub" id="cSub"></div></div>
    <div id="cBadge"></div>
  </div>
  <div class="cbody" id="cBody"></div>
</div>

</div>

<!-- Modal médicament -->
<div class="modal" id="medModal">
  <div class="modal-box">
    <div class="modal-title">Ajouter un médicament</div>
    <div class="frow"><div class="flabel">Médicament (DCI)</div><input class="finput" id="mNom" placeholder="ex: Amoxicilline" autocomplete="off"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="frow"><div class="flabel">Dosage</div><input class="finput" id="mDose" placeholder="ex: 500mg" autocomplete="off"/></div>
      <div class="frow"><div class="flabel">Durée</div><input class="finput" id="mDuree" placeholder="ex: 7 jours" autocomplete="off"/></div>
    </div>
    <div class="frow"><div class="flabel">Posologie</div><input class="finput" id="mPoso" placeholder="ex: 3x/jour après repas" autocomplete="off"/></div>
    <div class="modal-acts">
      <button class="mbtn cancel" onclick="closeMedModal()">Annuler</button>
      <button class="mbtn ok" onclick="confirmMed()">Ajouter</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────
var RA_KEY='YOUR_RELEVANCE_AI_KEY';
var RA_AGENT='7d26fda3-fe2d-405c-8aed-645df10baa12';
var RA_RG='d7b62b';
var RA_RP='428dc1d8-2fa4-46da-b226-c26a52653ed0';

var MEDECINS={
  'quevi.gildas@gmail.com':{nom:'Dr. Quevi Gildas',spec:'Infectiologue',code:'1234',color:'#00C896'}
};

var CUR_MED=null, CUR_DOS=null, FILTRE='tous', MEDS=[], CID=null;

// ── STOCKAGE ─────────────────────────────
function getDos(){try{return JSON.parse(localStorage.getItem('hd_dos')||'[]');}catch(e){return[];}}
function saveDos(d){localStorage.setItem('hd_dos',JSON.stringify(d));}

function initDemo(){
  if(getDos().length>0)return;
  saveDos([
    {id:'DOS-001',patient:{nom:'Andrea',age:5,poids:'18kg',profil:'Enfant',ville:'Abidjan',voyage:'Aucun'},date:'01/03/2026 17:25',statut:'attente',urgent:true,
     symptomes:'Fièvre depuis 5 jours montant le soir à 39,5°C,Maux de tête forts,Douleurs au ventre autour du nombril,Pas d\'appétit,Diarrhée les premiers jours,Constipation maintenant,Très fatiguée',
     diagIA:'1. Fièvre typhoïde — Probabilité élevée (fièvre prolongée, douleurs abdominales, diarrhée puis constipation, contexte africain)\n2. Paludisme — Probabilité moyenne (fièvre vespérale, Abidjan zone endémique)\n3. Méningite — Probabilité faible (maux de tête, fièvre, à surveiller)',
     diagMed:'',examens:'',notes:'',traitement:[],valIA:null,envoye:false},
    {id:'DOS-002',patient:{nom:'Marc Antoine',age:34,poids:'72kg',profil:'Adulte',ville:'Abidjan',voyage:'Aucun'},date:'01/03/2026 14:10',statut:'attente',urgent:false,
     symptomes:'Toux sèche persistante depuis 3 semaines,Légère fièvre le soir,Sueurs nocturnes,Perte de poids',
     diagIA:'1. Tuberculose pulmonaire — Probabilité élevée (toux chronique, fièvre vespérale, sueurs nocturnes, amaigrissement)\n2. Pneumonie atypique — Probabilité moyenne\n3. VIH avec infection opportuniste — À exclure',
     diagMed:'',examens:'',notes:'',traitement:[],valIA:null,envoye:false},
    {id:'DOS-003',patient:{nom:'Sarah',age:28,poids:'58kg',profil:'Adulte',ville:'Abidjan',voyage:'Aucun'},date:'28/02/2026 09:45',statut:'traite',urgent:false,
     symptomes:'Douleurs pelviennes,Pertes inhabituelles,Fièvre légère',
     diagIA:'Infection gynécologique probable. Consultation urgente recommandée.',
     diagMed:'Infection génitale haute — salpingite',examens:'Prélèvement vaginal, NFS, CRP',notes:'T°38.2, douleur à la mobilisation utérine',
     traitement:[{nom:'Amoxicilline + Acide clavulanique',dose:'1g',duree:'7j',poso:'2x/j'}],
     valIA:{statut:'conforme',texte:'Traitement conforme aux recommandations OMS.'},envoye:true}
  ]);
}

// ── NAVIGATION ───────────────────────────
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});document.getElementById(id).classList.add('on');}
function goBack(){renderDash();showScreen('dashScreen');}

// ── LOGIN ────────────────────────────────
function doLogin(){
  var email=(document.getElementById('liEmail').value||'').trim().toLowerCase();
  var code=(document.getElementById('liCode').value||'').trim();
  var med=MEDECINS[email];
  if(med&&med.code===code){
    CUR_MED=Object.assign({email:email},med);
    document.getElementById('liErr').classList.remove('on');
    document.getElementById('dashNom').textContent=med.nom;
    document.getElementById('dashSpec').textContent=med.spec;
    initDemo();renderDash();showScreen('dashScreen');
  } else {document.getElementById('liErr').classList.add('on');}
}
function doLogout(){CUR_MED=null;document.getElementById('liEmail').value='';document.getElementById('liCode').value='';showScreen('loginScreen');}
document.getElementById('liCode').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

// ── DASHBOARD ────────────────────────────
function setFilter(f,el){FILTRE=f;document.querySelectorAll('.ftag').forEach(function(t){t.classList.remove('on');});el.classList.add('on');renderDossiers();}

function renderDash(){
  var ds=getDos();
  document.getElementById('stA').textContent=ds.filter(function(d){return d.statut==='attente';}).length;
  document.getElementById('stT').textContent=ds.filter(function(d){return d.statut==='traite';}).length;
  document.getElementById('stR').textContent=ds.filter(function(d){return d.statut==='refere';}).length;
  renderDossiers();
}

function renderDossiers(){
  var ds=getDos();
  if(FILTRE!=='tous')ds=ds.filter(function(d){return d.statut===FILTRE;});
  var list=document.getElementById('dList');
  if(!ds.length){list.innerHTML='<div class="empty"><div class="empty-ico">📂</div><div class="empty-txt">Aucun dossier</div></div>';return;}
  var colors=['#00C896','#0EA5E9','#F59E0B','#A78BFA','#F97316'];
  list.innerHTML='';
  ds.forEach(function(d){
    var ci=d.patient.nom.charCodeAt(0)%colors.length;
    var bmap={attente:'<span class="badge a">⏳ EN ATTENTE</span>',traite:'<span class="badge t">✅ TRAITÉ</span>',refere:'<span class="badge r">🔄 RÉFÉRÉ</span>'};
    var el=document.createElement('div');
    el.className='dcard'+(d.urgent?' urg':'');
    el.innerHTML='<div class="dcard-top">'+
      '<div class="dcard-av" style="background:'+colors[ci]+'">'+d.patient.nom.charAt(0)+'</div>'+
      '<div style="flex:1"><div class="dcard-nom">'+d.patient.nom+' <span style="font-size:11px;color:var(--text2);font-weight:400">• '+d.patient.age+' ans'+(d.patient.poids?' • '+d.patient.poids:'')+'</span></div>'+
      '<div class="dcard-meta">'+d.date+(d.urgent?' • <span style="color:var(--danger)">⚠️ Urgent</span>':'')+'</div></div>'+
      (bmap[d.statut]||'')+
    '</div>'+
    '<div class="dcard-symp">'+d.symptomes.replace(/,/g,' • ')+'</div>'+
    '<div class="dcard-foot"><span class="dcard-id">'+d.id+'</span><span style="font-size:12px;color:var(--text3)">Ouvrir →</span></div>';
    el.onclick=function(){openDos(d.id);};
    list.appendChild(el);
  });
}

// ── CONSULTATION ─────────────────────────
function openDos(id){
  var ds=getDos();
  CUR_DOS=ds.find(function(d){return d.id===id;})||null;
  if(!CUR_DOS)return;
  MEDS=CUR_DOS.traitement?JSON.parse(JSON.stringify(CUR_DOS.traitement)):[];
  CID=null;
  document.getElementById('cTitre').textContent=CUR_DOS.patient.nom+' • '+CUR_DOS.patient.age+' ans';
  document.getElementById('cSub').textContent=CUR_DOS.id+' • '+CUR_DOS.date;
  var bmap={attente:'<span class="badge a">⏳ EN ATTENTE</span>',traite:'<span class="badge t">✅ TRAITÉ</span>',refere:'<span class="badge r">🔄 RÉFÉRÉ</span>'};
  document.getElementById('cBadge').innerHTML=bmap[CUR_DOS.statut]||'';
  renderConsult();
  showScreen('consultScreen');
}

function sympToList(txt){
  var items=txt.split(',').map(function(s){return s.trim();}).filter(function(s){return s.length>3;});
  return '<div class="symp-grid">'+items.map(function(s){
    return '<div class="symp-item"><span class="symp-dot">●</span><span class="symp-txt">'+s+'</span></div>';
  }).join('')+'</div>';
}

function renderDiseaseTags(current){
  var diseases=['Paludisme','Typhoïde','Méningite','Tuberculose','VIH','Dengue','Choléra','Pneumonie','Gastroentérite','Infection urinaire','Infection gynécologique','Helminthiase'];
  return diseases.map(function(d){
    var on=current&&current.toLowerCase().indexOf(d.toLowerCase())>=0;
    return '<div class="dtag'+(on?' on':'')+'" onclick="selectDisease(this)">'+d+'</div>';
  }).join('');
}
function selectDisease(el){
  document.querySelectorAll('.dtag').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  var inp=document.getElementById('diagMedInput');
  if(inp)inp.value=el.textContent;
}

function renderMeds(ro){
  if(!MEDS.length)return '<div style="color:var(--text3);font-size:12px;text-align:center;padding:12px;">Aucun médicament ajouté</div>';
  return MEDS.map(function(m,i){
    return '<div class="med-item"><div class="med-info"><div class="med-name">'+m.nom+'</div><div class="med-detail">'+m.dose+' — '+m.poso+' — '+m.duree+'</div></div>'+
      (!ro?'<button class="med-del" onclick="removeMed('+i+')">×</button>':'')+
    '</div>';
  }).join('');
}
function removeMed(i){MEDS.splice(i,1);document.getElementById('medList').innerHTML=renderMeds(false);}

function renderConsult(){
  var d=CUR_DOS;
  var ro=d.statut==='traite'||d.statut==='refere';
  var p=d.patient;
  document.getElementById('cBody').innerHTML=

    // 1. Patient
    '<div class="fsec">'+
      '<div class="fsec-title"><div class="fsec-ico bl">👤</div><div class="fsec-label">Patient</div></div>'+
      '<div class="chips">'+
        '<div class="chip"><span class="chip-k">Nom</span><span class="chip-v">'+p.nom+'</span></div>'+
        '<div class="chip"><span class="chip-k">Âge</span><span class="chip-v">'+p.age+' ans</span></div>'+
        (p.poids?'<div class="chip"><span class="chip-k">Poids</span><span class="chip-v">'+p.poids+'</span></div>':'')+
        '<div class="chip"><span class="chip-k">Profil</span><span class="chip-v">'+p.profil+'</span></div>'+
        '<div class="chip"><span class="chip-k">Ville</span><span class="chip-v">'+(p.ville||'—')+'</span></div>'+
        '<div class="chip"><span class="chip-k">Voyage</span><span class="chip-v">'+(p.voyage||'Aucun')+'</span></div>'+
      '</div>'+
      '<div class="flabel" style="margin-bottom:8px;">Symptômes</div>'+
      sympToList(d.symptomes)+
    '</div>'+

    // 2. Diagnostic médecin
    '<div class="fsec">'+
      '<div class="fsec-title"><div class="fsec-ico gr">🔬</div><div class="fsec-label">Diagnostic médecin</div></div>'+
      '<div class="dtags" id="diseaseTags">'+renderDiseaseTags(d.diagMed)+'</div>'+
      '<div class="frow"><div class="flabel">Diagnostic retenu</div><input class="finput" id="diagMedInput" placeholder="Ex: Fièvre typhoïde confirmée" value="'+d.diagMed+'"'+(ro?' readonly':'')+' autocomplete="off"/></div>'+
      '<div class="frow"><div class="flabel">Examens demandés</div><textarea class="finput" id="examensInput" rows="2" placeholder="Ex: NFS, hémoculture, Widal..."'+(ro?' readonly':'')+'>'+(d.examens||'')+'</textarea></div>'+
      '<div class="frow"><div class="flabel">Observations cliniques</div><textarea class="finput" id="notesInput" rows="2" placeholder="Signes vitaux, examen physique..."'+(ro?' readonly':'')+'>'+(d.notes||'')+'</textarea></div>'+
    '</div>'+

    // 3. Traitement
    '<div class="fsec">'+
      '<div class="fsec-title"><div class="fsec-ico wa">💊</div><div class="fsec-label">Traitement prescrit</div></div>'+
      '<div id="medList">'+renderMeds(ro)+'</div>'+
      (!ro?'<button class="add-med" onclick="openMedModal()">+ Ajouter un médicament</button>':'')+
    '</div>'+

    // 4. Bouton envoyer (si dossier actif)
    (!ro?'<button class="btn-send" id="btnSend" onclick="envoyerPrescription()">📤 Envoyer la prescription</button>':'')+

    // 5. Section validation — masquée au départ
    '<div id="valSection" style="display:none;">'+
      '<div class="fsec">'+
        '<div class="fsec-title"><div class="fsec-ico bl">🤖</div><div class="fsec-label">Analyse IA (confidentielle)</div></div>'+
        '<div class="ia-box"><div class="ia-tag">✦ HEY DOC! IA</div><div class="ia-txt">'+d.diagIA.replace(/\n/g,'<br>')+'</div></div>'+
      '</div>'+
      '<div class="fsec">'+
        '<div class="fsec-title"><div class="fsec-ico pu">✦</div><div class="fsec-label">Validation du traitement</div></div>'+
        '<div id="valBox"><div class="val-box load"><span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span><div style="margin-top:8px;font-size:12px;color:var(--text2)">Vérification en cours...</div></div></div>'+
      '</div>'+
    '</div>'+

    // Dossier traité — résultat
    (ro&&d.valIA?
      '<div class="fsec"><div class="fsec-title"><div class="fsec-ico pu">✦</div><div class="fsec-label">Résultat validation IA</div></div>'+
      '<div class="val-box '+(d.valIA.statut==='conforme'?'conf':'nconf')+'">'+
        '<div class="val-title">'+(d.valIA.statut==='conforme'?'✅ Traitement CONFORME':'⚠️ Non conforme')+'</div>'+
        '<div class="val-txt">'+d.valIA.texte+'</div>'+
      '</div></div>'
    :'')+

    '<div style="height:30px;"></div>';
}

// ── ENVOI PRESCRIPTION ───────────────────
function envoyerPrescription(){
  var diag=(document.getElementById('diagMedInput')||{}).value||'';
  if(!diag){toast('⚠️ Renseignez le diagnostic');return;}
  if(!MEDS.length){toast('⚠️ Ajoutez au moins un médicament');return;}
  var btn=document.getElementById('btnSend');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span> Validation en cours...';}
  var valSec=document.getElementById('valSection');
  valSec.style.display='block';
  setTimeout(function(){valSec.scrollIntoView({behavior:'smooth'});},100);
  lancerValidation();
}

// ── VALIDATION IA ────────────────────────
function lancerValidation(){
  var diag=(document.getElementById('diagMedInput')||{}).value||'';
  var tx=MEDS.map(function(m){return m.nom+' '+m.dose+' — '+m.poso+' — '+m.duree;}).join('\n');
  var prompt='Expert prescriptions OMS Afrique subsaharienne.\nDiagnostic: '+diag+'\nPatient: '+CUR_DOS.patient.nom+', '+CUR_DOS.patient.age+' ans'+(CUR_DOS.patient.poids?', '+CUR_DOS.patient.poids:'')+'\nTraitement prescrit:\n'+tx+'\nAnalyse IA: '+CUR_DOS.diagIA+'\n\nRéponds UNIQUEMENT avec:\n1. VERDICT: CONFORME ou NON CONFORME\n2. ANALYSE: 2-3 lignes\n3. Si NON CONFORME: RECOMMANDATION OMS précise';

  // Utiliser Relevance AI si clé configurée, sinon simulation
  if(RA_KEY&&RA_KEY!=='YOUR_RELEVANCE_AI_KEY'){
    lancerViaRelevance(prompt);
  } else {
    // Simulation pour les tests (répond en 2s)
    setTimeout(function(){
      var sim='VERDICT: CONFORME\nANALYSE: Le traitement prescrit est adapté au diagnostic et conforme aux protocoles OMS pour cette région. Les dosages pédiatriques sont appropriés au poids du patient. La durée de traitement est correcte.';
      afficherValidation(sim);
    },2000);
  }
}

async function lancerViaRelevance(prompt){
  try{
    var ah=RA_KEY.includes(':')?RA_KEY:(RA_RP+':'+RA_KEY);
    var r=await fetch('https://api-'+RA_RG+'.stack.tryrelevance.com/latest/agents/trigger',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':ah},
      body:JSON.stringify({message:{role:'user',content:prompt},agent_id:RA_AGENT})
    });
    var data=await r.json();
    if(data.conversation_id)CID=data.conversation_id;
    var sid=data.job_info&&data.job_info.studio_id;
    var jid=data.job_info&&data.job_info.job_id;
    if(sid&&jid){
      var rep=await pollVal(sid,jid);
      afficherValidation(rep||'Validation indisponible');
    }
  }catch(e){afficherValidation('Erreur: '+e.message);}
}

async function pollVal(sid,jid){
  var ah=RA_KEY.includes(':')?RA_KEY:(RA_RP+':'+RA_KEY);
  var url='https://api-'+RA_RG+'.stack.tryrelevance.com/latest/studios/'+sid+'/async_poll/'+jid;
  for(var i=0;i<30;i++){
    await new Promise(function(r){setTimeout(r,2000);});
    try{
      var r=await fetch(url,{headers:{'Authorization':ah}});
      var d=await r.json();
      for(var u of(d.updates||[])){
        if(u.type==='agent-complete'){return u.output&&u.output.answer?u.output.answer:u.message&&u.message.content?u.message.content:null;}
      }
      if(d.status==='complete'||d.status==='failed')break;
    }catch(e){}
  }
  return null;
}

function afficherValidation(rep){
  var conf=rep.toLowerCase().indexOf('non conforme')<0&&rep.toLowerCase().indexOf('conforme')>=0;
  CUR_DOS.valIA={statut:conf?'conforme':'nonconforme',texte:rep};
  var vb=document.getElementById('valBox');
  if(!vb)return;
  vb.innerHTML='<div class="val-box '+(conf?'conf':'nconf')+'">'+
    '<div class="val-title">'+(conf?'✅ Traitement CONFORME':'⚠️ Traitement NON CONFORME')+'</div>'+
    '<div class="val-txt">'+rep.replace(/\n/g,'<br>')+'</div>'+
  '</div>'+
  '<div class="val-actions">'+
    '<button class="vbtn ok" onclick="finaliser(false)">'+(conf?'✅ Envoyer au patient':'✅ Corriger & envoyer')+'</button>'+
    (!conf?'<button class="vbtn ref" onclick="finaliser(true)">🔄 Maintenir & référer</button>':'')+
  '</div>';
  if(conf){
    toast('✅ Validé — envoi dans 2s...');
    setTimeout(function(){finaliser(false);},2000);
  }
}

// ── FINALISER ────────────────────────────
function finaliser(referer){
  var diag=(document.getElementById('diagMedInput')||{}).value||'';
  var examens=(document.getElementById('examensInput')||{}).value||'';
  var notes=(document.getElementById('notesInput')||{}).value||'';
  CUR_DOS.diagMed=diag;CUR_DOS.examens=examens;CUR_DOS.notes=notes;
  CUR_DOS.traitement=MEDS;CUR_DOS.statut=referer?'refere':'traite';CUR_DOS.envoye=true;
  CUR_DOS.dateCloture=new Date().toLocaleDateString('fr-FR');
  var ds=getDos();var idx=ds.findIndex(function(d){return d.id===CUR_DOS.id;});
  if(idx>=0)ds[idx]=CUR_DOS;saveDos(ds);
  var tx=MEDS.map(function(m){return '• '+m.nom+' '+m.dose+' — '+m.poso+' — '+m.duree;}).join('\n');
  var dest=referer?'referent@hopital.ci':(CUR_DOS.patientEmail||'patient@heydoc.ci');
  var subj=encodeURIComponent('[Hey Doc!] Consultation '+CUR_DOS.patient.nom+' — '+CUR_DOS.dateCloture);
  var body=encodeURIComponent('Bonjour,\n\n'+(referer?'Dossier référé pour validation.':'Résultat de votre consultation.')+'\n\n=== PATIENT ===\n'+CUR_DOS.patient.nom+', '+CUR_DOS.patient.age+' ans'+(CUR_DOS.patient.poids?', '+CUR_DOS.patient.poids:'')+'\n\n=== DIAGNOSTIC ===\n'+diag+'\n\n=== TRAITEMENT ===\n'+tx+(examens?'\n\n=== EXAMENS ===\n'+examens:'')+(notes?'\n\n=== OBSERVATIONS ===\n'+notes:'')+'\n\n=== VALIDATION IA ===\n'+(CUR_DOS.valIA?CUR_DOS.valIA.texte:'—')+'\n\n---\nMédecin : '+CUR_MED.nom+' — Hey Doc!');
  window.location.href='mailto:'+dest+'?subject='+subj+'&body='+body;
  toast(referer?'🔄 Référé au médecin référent':'✅ Envoyé au patient');
  setTimeout(function(){renderDash();showScreen('dashScreen');},1500);
}

// ── MODAL MÉDICAMENT ─────────────────────
function openMedModal(){['mNom','mDose','mDuree','mPoso'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('medModal').classList.add('on');}
function closeMedModal(){document.getElementById('medModal').classList.remove('on');}
function confirmMed(){
  var nom=document.getElementById('mNom').value.trim();
  if(!nom){toast('Entrez le nom du médicament');return;}
  MEDS.push({nom:nom,dose:document.getElementById('mDose').value.trim()||'—',duree:document.getElementById('mDuree').value.trim()||'—',poso:document.getElementById('mPoso').value.trim()||'—'});
  document.getElementById('medList').innerHTML=renderMeds(false);
  closeMedModal();
}

// ── UTILS ────────────────────────────────
function toast(msg){
  var t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},2500);
}
</script>
